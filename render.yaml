# Blueprint для деплоя на Render.com из GitHub.
# В Dashboard: New → Blueprint → подключи репозиторий → Render создаст БД и Web Service.
databases:
  - name: teamfinder-db
    plan: free
    databaseName: teamfinder
    user: teamfinder

services:
  - type: web
    name: teamfinder-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: teamfinder-db
          property: connectionString
      - key: WEBAPP_URL
        sync: false
      - key: WEBAPP_HOST
        value: 0.0.0.0
      - key: PRICE_BEST_TEAM
        value: "5"
      - key: PRICE_HIGHLIGHT
        value: "7"
      - key: PRICE_CONTACT_PACK
        value: "3"
      - key: PRICE_PRO_SUBSCRIPTION
        value: "15"
      - key: PRICE_SINGLE_CONTACT
        value: "2"
      - key: PRICE_PREMIUM_APPLICATION
        value: "3"
